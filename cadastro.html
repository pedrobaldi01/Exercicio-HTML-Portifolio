<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Formulário de contato para enviar mensagens e solicitações.">
        <title>Formulário</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h1>Cadastro</h1>
            <p>Página de cadastro para criar uma conta.</p>
            <nav>
                <a href="index.html">Início</a>
                <a href="sobre.html">Sobre</a>
                <a href="contato.html">Contato</a>
                <a href="links.html">Links</a>
                <a href="cadastro.html">Cadastro</a>
            </nav>
        </header>
    </body>
    <main> 
        <section>
            <h2>Cadastro</h2>
            <form action="#" method="post" class="formulario-cadastro">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="Nome e Sobrenome" placeholder="Digite seu nome" required>
                
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" name="Telefone" placeholder="(00) 00000-0000" required>

                <label for="cep">CEP</label>
                <input type="text" id="cep" name="CEP" placeholder="00000-000" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="Email" placeholder="Digite seu email" required>

                <label for="senha">Senha</label>
                <input type="password" id="senha" name="Senha" placeholder="Senha" required>

                <label for="confirmarSenha">Confirmar Senha</label>
                <input type="password" id="confirmarSenha" name="Confirmar Senha" placeholder="Confirmar Senha" required>

                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
    <footer>
        <p>© 2026 - Pedro Baldi - Ciência da Computação - Turma 2024/T1</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
