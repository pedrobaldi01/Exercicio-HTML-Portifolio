<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="pagina-contato">
    <header>
        <h1>Contato</h1>
        <p>Envie uma mensagem ou acesse minhas redes sociais.</p>
        <nav>
            <a href="index.html">Início</a>
            <a href="sobre.html">Sobre</a>
            <a href="contato.html" class="ativo" aria-current="page">Contato</a>
            <a href="links.html">Links</a>
            <a href="cadastro.html">Cadastro</a>  
            <a href="handson.html">Hands-on</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Contato</h2>
            <form action="#" method="post" class="formulario-contato">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="Nome e Sobrenome" placeholder="Digite seu nome" required>
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" name="Telefone" placeholder="(00) 00000-0000" required>
                <label for="email">Email</label>
                <input type="email" id="email" name="Email" placeholder="Digite seu email" required>
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="Mensagem" rows="6" placeholder="Escreva sua mensagem" required></textarea>

                <button type="submit">Enviar</button>

            </form>
        </section>

        <section>
            <h2>Redes sociais</h2>
            <ul>
                <li><a href="https://www.linkedin.com/in/pedro-drb" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
                <li><a href="https://github.com/pedrobaldi01" target="_blank" rel="noopener noreferrer">GitHub acadêmico</a></li>
                <li><a href="https://github.com/pedro-drb" target="_blank" rel="noopener noreferrer">GitHub pessoal</a></li>
            </ul>
        </section>
    </main>

    <footer>
        <p>© 2026 - Pedro Baldi - Ciência da Computação - Turma 2024/T1</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
